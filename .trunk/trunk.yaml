# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.22.15
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
  sources:
    - id: trunk
      ref: v1.6.8
      uri: https://github.com/trunk-io/plugins
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - go@1.21.0
    - node@18.20.5
    - python@3.10.8
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  ignore:
    - linters: [ALL]
      paths:
        - ".trunk/trunk.yaml"
    - linters: [markdownlint]
      paths:
        - "doc/internal/**"
        - "ARCHITECTURE.md"
        - "CLAUDE.md"
        - "CONTRIBUTING.md"
        - "COMMIT_SUMMARY.md"
        - "NEW_FEATURES_README.md"
    - linters: [yamllint]
      paths:
        - ".github/workflows/**"
        - "doc/templates/**"
    - linters: [shellcheck]
      paths:
        - "doc/templates/**"
    - linters: [bandit]
      paths:
        - "tests/**"
        - "risuclient/cache.py"
        - "risuclient/shell.py"
        - "tools/**"
    - linters: [flake8]
      paths:
        - "risuclient/executor.py"
    - linters: [checkov]
      paths:
        - ".github/workflows/**"
  enabled:
    - actionlint@1.7.7
    - bandit@1.8.3
    - black@25.1.0
    - checkov@3.2.421
    - flake8@7.2.0
    - git-diff-check
    - gofmt@1.20.4
    - golangci-lint2@2.1.6
    - hadolint@2.12.1-beta
    - isort@6.0.1
    - markdownlint@0.44.0
    - osv-scanner@2.0.2
    - oxipng@9.1.5
    - prettier@3.5.3
    - ruff@0.11.9
    - shellcheck@0.10.0
    - shfmt@3.6.0
    - taplo@0.9.3
    - trufflehog@3.88.29
    - yamllint@1.37.1
actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
