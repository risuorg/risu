# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.22.15
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
  sources:
    - id: trunk
      ref: v1.6.8
      uri: https://github.com/trunk-io/plugins
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - go@1.21.0
    - node@18.20.5
    - python@3.10.8
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  ignore:
    - linters: [markdownlint]
      paths:
        - "*.md" # Internal docs don't need strict formatting
    - linters: [yamllint]
      paths:
        - ".github/workflows/*.yml" # GitHub Actions often have long lines
        - "doc/templates/*.yml" # Template examples
    - linters: [shellcheck]
      paths:
        - "doc/templates/*.sh" # Template examples, SC1091 is expected
    - linters: [bandit]
      paths:
        - "tests/**" # Test files have expected security patterns (B403, B108)
        - "risuclient/cache.py" # B403 pickle usage is intentional
        - "risuclient/shell.py" # B110 bare except is legacy code
        - "tools/**" # B404, B603, B607 subprocess usage is safe
    - linters: [flake8]
      paths:
        - "risuclient/executor.py" # F824 false positive on global usage
    - linters: [checkov]
      paths:
        - ".github/workflows/*.yml" # CKV2_GHA_1 write-all permissions needed for releases
  enabled:
    - actionlint@1.7.7
    - bandit@1.8.3
    - black@25.1.0
    - checkov@3.2.421
    - flake8@7.2.0
    - git-diff-check
    - gofmt@1.20.4
    - golangci-lint2@2.1.6
    - hadolint@2.12.1-beta
    - isort@6.0.1
    - markdownlint@0.44.0
    - osv-scanner@2.0.2
    - oxipng@9.1.5
    - prettier@3.5.3
    - ruff@0.11.9
    - shellcheck@0.10.0
    - shfmt@3.6.0
    - taplo@0.9.3
    - trufflehog@3.88.29
    - yamllint@1.37.1
actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
